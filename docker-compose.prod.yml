version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-governance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-governance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-governance}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gov-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - gov-network

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["--jetstream"]
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - gov-network

  # --- Application ---
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gov-network

  seed:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    env_file: .env.production
    entrypoint: ["node", "dist/db/seed.js"]
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - init
    networks:
      - gov-network

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - gov-network

  nginx:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api
      - web
    networks:
      - gov-network

volumes:
  pgdata:

networks:
  gov-network:
    driver: bridge
